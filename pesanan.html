<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya | Goedang Grosir</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #e0e5ec; --text-main: #2d3436; --text-muted: #636e72; --accent-color: #0984e3;
            --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        [data-theme="dark"] {
            --bg-color: #1a1b1e; --text-main: #f5f6fa; --text-muted: #a4b0be; --accent-color: #00e5ff;
            --shadow-light: rgba(255, 255, 255, 0.05); --shadow-dark: rgba(0, 0, 0, 0.6);
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        .top-nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .logo { font-size: 20px; font-weight: 700; color: var(--accent-color); letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        
        .controls { display: flex; align-items: center; gap: 20px; flex: 1; justify-content: flex-end; }
        .theme-switch { width: 60px; height: 30px; border-radius: 50px; background: var(--bg-color); box-shadow: var(--neu-pressed); position: relative; cursor: pointer; display: flex; align-items: center; padding: 4px; }
        .switch-handle { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-color); box-shadow: var(--neu-flat); position: absolute; left: 4px; transition: transform 0.4s ease; display: flex; justify-content: center; align-items: center; color: var(--accent-color); font-size: 10px; }
        [data-theme="dark"] .switch-handle { transform: translateX(30px); }

        .nav-link { color: var(--text-muted); text-decoration: none; position: relative; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: color 0.3s ease;}
        .nav-link:hover, .nav-link.active { color: var(--accent-color); }
        .neu-btn-icon { background: var(--bg-color); color: var(--text-main); border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: var(--neu-flat-sm); cursor: pointer; text-decoration: none; position: relative; transition: all 0.2s; }
        .neu-btn-icon:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }
        .nav-profile-badge { display: flex; flex-direction: row; align-items: center; justify-content: center; text-decoration: none; gap: 10px; transition: transform 0.2s ease; cursor: pointer; background: var(--bg-color); padding: 5px 15px 5px 5px; border-radius: 50px; box-shadow: var(--neu-flat-sm); }
        .nav-profile-badge:active { box-shadow: var(--neu-pressed-sm); }
        .nav-profile-badge img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; box-shadow: var(--neu-pressed-sm); border: 2px solid transparent; }
        .nav-profile-badge span { font-size: 13px; font-weight: 700; color: var(--text-main); max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .badge-count { position: absolute; top: -10px; right: -15px; background: #ff4757; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--bg-color); display: flex; justify-content: center; align-items: center; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; flex: 1; width: 100%; }
        .page-title { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: 700; margin-bottom: 25px; }
        .btn-back { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-color); color: var(--text-main); text-decoration: none; box-shadow: var(--neu-flat); transition: transform 0.2s; }
        .btn-back:active { box-shadow: var(--neu-pressed); color: var(--accent-color); }

        .status-tabs { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px 20px 5px; margin-bottom: 10px; -ms-overflow-style: none; scrollbar-width: none; }
        .status-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex-shrink: 0; padding: 10px 25px; border-radius: 50px; background: var(--bg-color); color: var(--text-main); border: none; font-size: 13px; font-weight: 600; box-shadow: var(--neu-flat-sm); cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }

        .orders-container { display: flex; flex-direction: column; gap: 25px; padding-bottom: 50px; }
        
        .order-card { background: var(--bg-color); border-radius: 20px; padding: 20px; box-shadow: var(--neu-flat); display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-3px); }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed rgba(128,128,128,0.2); padding-bottom: 15px; }
        .order-id { font-size: 13px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .order-date { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        
        .status-badge { padding: 6px 15px; border-radius: 50px; font-size: 11px; font-weight: 700; box-shadow: var(--neu-pressed-sm); text-transform: uppercase; }
        .status-diproses { color: #e67e22; border: 1px solid rgba(230, 126, 34, 0.2); }
        .status-dikirim { color: var(--accent-color); border: 1px solid rgba(9, 132, 227, 0.2); }
        .status-selesai { color: #27ae60; border: 1px solid rgba(39, 174, 96, 0.2); }
        .status-dibatalkan { color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.2); }

        .order-items { display: flex; flex-direction: column; gap: 10px; }
        .order-item { display: flex; align-items: center; gap: 15px; background: var(--bg-color); padding: 10px; border-radius: 15px; box-shadow: var(--neu-pressed-sm); }
        .item-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; box-shadow: var(--neu-flat-sm); flex-shrink: 0; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-name { font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3;}
        .item-qty { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .item-price { font-size: 13px; font-weight: 700; color: var(--accent-color); margin-top: 2px;}

        .hidden-items-container { display: none; flex-direction: column; gap: 10px; margin-top: 5px; padding-top: 10px; border-top: 1px dashed rgba(128,128,128,0.2); animation: slideDown 0.3s ease-out forwards; }
        .hidden-items-container.active { display: flex; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .toggle-items-btn { background: none; border: none; font-size: 12px; color: var(--accent-color); font-weight: 700; cursor: pointer; text-align: center; margin-top: 5px; padding: 8px; border-radius: 10px; display: block; width: 100%; transition: all 0.2s; }
        .toggle-items-btn:hover { background: rgba(9, 132, 227, 0.1); }
        .toggle-items-btn:active { transform: scale(0.98); }

        .order-footer { display: flex; justify-content: space-between; align-items: center; border-top: 2px dashed rgba(128,128,128,0.2); padding-top: 15px; margin-top: 5px; }
        .total-text { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .total-price { font-size: 18px; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        
        .btn-track { background: var(--bg-color); color: var(--accent-color); border: none; padding: 10px 20px; border-radius: 12px; font-size: 12px; font-weight: 700; box-shadow: var(--neu-flat-sm); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-track:active { box-shadow: var(--neu-pressed-sm); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 50px; margin-bottom: 20px; color: var(--shadow-dark); opacity: 0.5; }
        .empty-text { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .empty-subtext { font-size: 12px; margin-bottom: 30px; }

        .btn-shop-now { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: var(--bg-color); color: var(--accent-color); padding: 12px 30px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: 700; box-shadow: var(--neu-flat); transition: all 0.3s; }
        .btn-shop-now:active { box-shadow: var(--neu-pressed); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 4000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-color); width: 90%; max-width: 320px; border-radius: 25px; padding: 30px 20px; box-shadow: var(--neu-flat); transform: translateY(30px); transition: transform 0.3s ease; text-align: center; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .neu-btn { padding: 12px; border-radius: 50px; border: none; background: var(--bg-color); color: var(--text-main); font-size: 13px; font-weight: 700; box-shadow: var(--neu-flat-sm); cursor: pointer; transition: all 0.3s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .neu-btn:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }

        .bottom-nav { display: none; }

        @media (max-width: 768px) {
            .top-nav { padding: 12px 20px; }
            .hide-on-mobile { display: none !important; }
            .container { padding-bottom: 120px; margin-top: 15px; } 
            
            .order-card { padding: 15px; }
            .order-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .status-badge { align-self: flex-start; }
            
            .item-img { width: 50px; height: 50px; }
            .item-name { font-size: 12px; }
            .item-price { font-size: 12px; }
            .total-price { font-size: 16px; }

            .bottom-nav { 
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; 
                background-color: var(--bg-color); border-radius: 25px 25px 0 0; 
                box-shadow: 0 -8px 20px rgba(0,0,0,0.05); z-index: 999; 
                padding: 10px 15px; 
                justify-content: space-between; 
                padding-bottom: max(15px, env(safe-area-inset-bottom)); 
                gap: 8px; 
            }
            [data-theme="dark"] .bottom-nav { box-shadow: 0 -8px 20px rgba(0,0,0,0.4); }
            
            .bottom-nav-item { 
                flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
                text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 600; 
                padding: 10px 0; border-radius: 18px; 
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: transparent; 
            }
            
            .bottom-nav-item i { 
                font-size: 20px; margin-bottom: 4px; 
                transition: transform 0.2s ease, color 0.2s ease; 
            }
            
            .bottom-nav-item.active { 
                color: var(--accent-color); 
                background: var(--bg-color); 
                box-shadow: var(--neu-pressed-sm); 
            }
            
            .bottom-nav-item.active i { transform: scale(1.15); }
            
            .badge-container { position: relative; display: inline-flex; }
            
            .bottom-nav-item .badge-count { 
                position: absolute; top: -5px; right: -12px; background: #ff4757; color: white; 
                font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 10px; 
                border: 2px solid var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 2;
            }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="logo"><i class="fas fa-box-open"></i> GOEDANG</a>
        
        <div class="controls">
            <div class="theme-switch" id="themeToggle" title="Toggle Dark Mode">
                <div class="switch-handle"><i class="fas fa-sun" id="switchIcon"></i></div>
            </div>
            
            <a href="promo.html" class="nav-link hide-on-mobile" title="Promo">
                <i class="fas fa-tags"></i> <span>Promo</span>
                <span class="badge-count" id="promoBadge" style="display: none;">0</span>
            </a>
            
            <a href="pesanan.html" class="nav-link hide-on-mobile active" title="Pesanan">
                <i class="fas fa-box"></i> <span>Pesanan</span>
                <span class="badge-count" id="orderBadge" style="display: none;">0</span>
            </a>
            
            <a href="keranjang.html" class="neu-btn-icon hide-on-mobile" title="Keranjang">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge-count" id="cartBadge" style="display: none; top: -5px; right: -5px; width: 18px; height: 18px; padding: 0;">0</span>
            </a>
            
            <a href="akun.html" class="nav-profile-badge hide-on-mobile" id="navLoginBtn">
                <img src="https://api.dicebear.com/7.x/micah/svg?seed=User&backgroundColor=e0e5ec" alt="Avatar" id="navAvatar">
                <span id="navUsername">Memuat...</span>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div>Pesanan Saya</div>
        </div>

        <div class="status-tabs">
            <button class="tab-btn active" data-status="Semua" onclick="filterOrders('Semua')">Semua</button>
            <button class="tab-btn" data-status="Diproses" onclick="filterOrders('Diproses')">Diproses</button>
            <button class="tab-btn" data-status="Dikirim" onclick="filterOrders('Dikirim')">Dikirim</button>
            <button class="tab-btn" data-status="Selesai" onclick="filterOrders('Selesai')">Selesai</button>
            <button class="tab-btn" data-status="Dibatalkan" onclick="filterOrders('Dibatalkan')">Dibatalkan</button>
        </div>

        <div class="orders-container" id="ordersContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--accent-color); margin-bottom: 20px;"></i>
                <div class="empty-text">Memuat data pesanan dengan aman...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="notificationModal">
        <div class="modal-content">
            <div id="notifIcon" style="font-size: 45px; margin-bottom: 15px;"></div>
            <h3 id="notifTitle" style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Judul</h3>
            <p id="notifMessage" style="font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5;">Pesan</p>
            <button class="neu-btn" id="notifBtn">Mengerti</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
        
        <a href="promo.html" class="bottom-nav-item">
            <div class="badge-container">
                <i class="fas fa-tags"></i>
                <span class="badge-count" id="mobilePromoBadge" style="display: none;">0</span>
            </div>
            <span>Promo</span>
        </a>
        
        <a href="keranjang.html" class="bottom-nav-item">
            <div class="badge-container">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge-count" id="mobileCartBadge" style="display: none;">0</span>
            </div>
            <span>Keranjang</span>
        </a>
        
        <a href="pesanan.html" class="bottom-nav-item active">
            <div class="badge-container">
                <i class="fas fa-box"></i>
                <span class="badge-count" id="mobileOrderBadge" style="display: none;">0</span>
            </div>
            <span>Pesanan</span>
        </a>
        
        <a href="akun.html" class="bottom-nav-item" id="mobileAccountBtn">
            <i class="fas fa-user"></i><span>Akun</span>
        </a>
    </nav>

    <script>
        const sessionData = localStorage.getItem('user_session');
        if (!sessionData) { window.location.replace('login.html'); }
        const session = JSON.parse(sessionData);

        let allOrders = [];
        let currentStatusFilter = 'Semua';

        const themeToggle = document.getElementById('themeToggle');
        const switchIcon = document.getElementById('switchIcon');
        const html = document.documentElement;

        if (localStorage.getItem('theme') === 'dark') { html.setAttribute('data-theme', 'dark'); switchIcon.classList.replace('fa-sun', 'fa-moon'); }

        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            switchIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
        });

        function showNotification(title, message, type, redirectUrl = null) {
            const notifModal = document.getElementById('notificationModal');
            const notifIcon = document.getElementById('notifIcon');
            const notifTitle = document.getElementById('notifTitle');
            const notifMessage = document.getElementById('notifMessage');
            const notifBtn = document.getElementById('notifBtn');

            if(type === 'success') {
                notifIcon.innerHTML = '<i class="fas fa-check-circle" style="color: #27ae60;"></i>';
                notifTitle.style.color = '#27ae60';
                notifBtn.innerText = 'Lanjut';
            } else if(type === 'error') {
                notifIcon.innerHTML = '<i class="fas fa-times-circle" style="color: #ff4757;"></i>';
                notifTitle.style.color = '#ff4757';
                notifBtn.innerText = 'Tutup';
            } else if(type === 'warning') {
                notifIcon.innerHTML = '<i class="fas fa-exclamation-triangle" style="color: #e67e22;"></i>';
                notifTitle.style.color = '#e67e22';
                notifBtn.innerText = redirectUrl ? 'Login Sekarang' : 'Mengerti';
            }

            notifTitle.innerText = title;
            notifMessage.innerText = message;
            notifBtn.onclick = function() { 
                notifModal.classList.remove('active'); 
                if(redirectUrl) window.location.href = redirectUrl;
            };
            notifModal.classList.add('active');
        }

        async function updateNavUI() {
            const loginBtn = document.getElementById('navLoginBtn');
            const mobileAccountBtn = document.getElementById('mobileAccountBtn');

            try {
                const userRes = await fetch('/api/user', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                
                if (userRes.status === 401 || userRes.status === 403) {
                    localStorage.removeItem('user_session');
                    window.location.replace('login.html');
                    return;
                }

                if (userRes.ok) {
                    const userData = await userRes.json();
                    const displayName = userData.nama_panggilan || (userData.nama_lengkap ? userData.nama_lengkap.split(' ')[0] : "User");
                    const avatarUrl = `https://api.dicebear.com/7.x/micah/svg?seed=${encodeURIComponent(displayName)}&backgroundColor=e0e5ec&baseColor=f9c9b6`;

                    loginBtn.className = 'nav-profile-badge hide-on-mobile';
                    loginBtn.href = 'akun.html';
                    loginBtn.innerHTML = `<img src="${avatarUrl}" alt="Avatar" id="navAvatar"><span id="navUsername">${displayName}</span>`;

                    if (mobileAccountBtn) {
                        mobileAccountBtn.innerHTML = `<img src="${avatarUrl}" alt="Avatar" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-bottom: 2px;"><span>${displayName}</span>`;
                    }
                }
            } catch (e) { console.log("Offline mode aktif"); }
        }

        async function syncBadges(token) {
            try {
                const cartRes = await fetch('/api/cart', { headers: { 'Authorization': `Bearer ${token}` } });
                if (cartRes.ok) {
                    const cartItems = await cartRes.json();
                    const totalQty = cartItems.reduce((sum, item) => sum + item.quantity, 0);
                    const cb = document.getElementById('cartBadge');
                    const mcb = document.getElementById('mobileCartBadge');
                    if (cb) { cb.style.display = totalQty > 0 ? 'flex' : 'none'; cb.innerText = totalQty > 99 ? '99+' : totalQty; }
                    if (mcb) { mcb.style.display = totalQty > 0 ? 'flex' : 'none'; mcb.innerText = totalQty > 99 ? '99+' : totalQty; }
                }
            } catch (e) {}

            try {
                const promoRes = await fetch('/api/vouchers', { headers: { 'Authorization': `Bearer ${token}` } });
                if (promoRes.ok) {
                    const promos = await promoRes.json();
                    const pb = document.getElementById('promoBadge');
                    const mpb = document.getElementById('mobilePromoBadge');
                    if (pb) { pb.style.display = promos.length > 0 ? 'flex' : 'none'; pb.innerText = promos.length; }
                    if (mpb) { mpb.style.display = promos.length > 0 ? 'flex' : 'none'; mpb.innerText = promos.length; }
                }
            } catch (e) {}
        }

        async function fetchOrders() {
            updateNavUI(); 

            try {
                const response = await fetch('/api/orders', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${session.access_token}` }
                });

                if (response.status === 401 || response.status === 403) throw new Error('Sesi tidak valid');
                if (!response.ok) throw new Error('Gagal terhubung ke database');
                
                allOrders = await response.json();
                allOrders.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
                
                renderOrders(currentStatusFilter);

                const activeOrders = allOrders.filter(o => {
                    const stat = (o.status || '').toLowerCase();
                    return stat !== 'selesai' && stat !== 'dibatalkan';
                });
                const ob = document.getElementById('orderBadge');
                const mob = document.getElementById('mobileOrderBadge');
                if (ob) { ob.style.display = activeOrders.length > 0 ? 'flex' : 'none'; ob.innerText = activeOrders.length; }
                if (mob) { mob.style.display = activeOrders.length > 0 ? 'flex' : 'none'; mob.innerText = activeOrders.length; }

                syncBadges(session.access_token);

            } catch (error) {
                console.error("Keamanan/Jaringan Error:", error);
                if(error.message === 'Sesi tidak valid') {
                    localStorage.removeItem('user_session');
                    window.location.replace('login.html');
                } else {
                    document.getElementById('ordersContainer').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-wifi empty-icon" style="color: #ff4757;"></i>
                            <div class="empty-text" style="color: #ff4757;">Gagal Memuat Pesanan</div>
                            <div class="empty-subtext">Periksa koneksi internet Anda.</div>
                            <button onclick="location.reload()" class="btn-shop-now" style="background:#ff4757; color:white;"><i class="fas fa-sync-alt"></i> Coba Lagi</button>
                        </div>
                    `;
                }
            }
        }

        function parsePriceSafe(val) {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            const digits = val.toString().replace(/[^0-9]/g, '');
            return parseInt(digits, 10) || 0;
        }

        function formatRupiah(number) { 
            return "Rp " + number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        }

        window.toggleItems = function(orderId, hiddenCount) {
            const container = document.getElementById(`hidden-items-${orderId}`);
            const btn = document.getElementById(`toggle-btn-${orderId}`);
            
            if (container.classList.contains('active')) {
                container.classList.remove('active');
                btn.innerHTML = `+ ${hiddenCount} barang lainnya`;
            } else {
                container.classList.add('active');
                btn.innerHTML = `<i class="fas fa-chevron-up"></i> Sembunyikan barang`;
            }
        }

        function renderOrders(statusFilter) {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';

            const filteredOrders = statusFilter === 'Semua' 
                ? allOrders 
                : allOrders.filter(o => (o.status || 'Diproses').toLowerCase() === statusFilter.toLowerCase());

            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open empty-icon"></i>
                        <div class="empty-text">Tidak Ada Pesanan</div>
                        <div class="empty-subtext">Anda belum memiliki pesanan dengan status ini.</div>
                        <a href="index.html" class="btn-shop-now"><i class="fas fa-shopping-cart"></i> Mulai Belanja</a>
                    </div>
                `;
                return;
            }

            filteredOrders.forEach(order => {
                const rawStatus = order.status || 'Diproses';
                const statusClass = `status-${rawStatus.toLowerCase()}`;
                const dateObj = new Date(order.created_at || Date.now());
                const formattedDate = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });

                const shortId = order.id ? order.id.toString().split('-')[0].toUpperCase() : Math.floor(Math.random()*10000);

                const items = order.items || [];
                let itemsHTML = '';
                
                if (items.length > 0) {
                    const firstItem = items[0];

                    const finalName = firstItem.product_name || 'Barang Grosir';
                    const finalImg = (firstItem.product_img && firstItem.product_img.startsWith('http')) 
                        ? firstItem.product_img 
                        : 'https://placehold.co/60x60/e0e5ec/a3b1c6?text=Barang';
                    
                    const cleanPrice = parsePriceSafe(firstItem.product_price);
                    const itemPriceDisplay = formatRupiah(cleanPrice);

                    itemsHTML += `
                        <div class="order-item">
                            <img src="${finalImg}" class="item-img" alt="Produk">
                            <div class="item-details">
                                <div class="item-name">${finalName}</div>
                                <div class="item-qty">${firstItem.quantity || 1} Barang x ${itemPriceDisplay}</div>
                                <div class="item-price">${formatRupiah(cleanPrice * (firstItem.quantity || 1))}</div>
                            </div>
                        </div>
                    `;
                    
                    if (items.length > 1) {
                        const hiddenCount = items.length - 1;
                        let hiddenItemsHTML = `<div class="hidden-items-container" id="hidden-items-${order.id}">`;
                        
                        for (let i = 1; i < items.length; i++) {
                            const currItem = items[i];

                            const currFinalName = currItem.product_name || 'Barang Grosir';
                            const currFinalImg = (currItem.product_img && currItem.product_img.startsWith('http')) 
                                ? currItem.product_img 
                                : 'https://placehold.co/60x60/e0e5ec/a3b1c6?text=Barang';
                            
                            const currCleanPrice = parsePriceSafe(currItem.product_price);
                            const currPriceDisplay = formatRupiah(currCleanPrice);

                            hiddenItemsHTML += `
                                <div class="order-item">
                                    <img src="${currFinalImg}" class="item-img" alt="Produk">
                                    <div class="item-details">
                                        <div class="item-name">${currFinalName}</div>
                                        <div class="item-qty">${currItem.quantity || 1} Barang x ${currPriceDisplay}</div>
                                        <div class="item-price">${formatRupiah(currCleanPrice * (currItem.quantity || 1))}</div>
                                    </div>
                                </div>
                            `;
                        }
                        hiddenItemsHTML += `</div>`;
                        
                        itemsHTML += hiddenItemsHTML;
                        itemsHTML += `<button class="toggle-items-btn" id="toggle-btn-${order.id}" onclick="toggleItems('${order.id}', ${hiddenCount})">+ ${hiddenCount} barang lainnya</button>`;
                    }
                } else {
                    itemsHTML = `<div class="more-items-text">Rincian barang belum dimasukkan.</div>`;
                }

                const cleanTotal = parsePriceSafe(order.total_price);
                const displayTotal = formatRupiah(cleanTotal);

                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header">
                        <div class="order-id">
                            <i class="fas fa-receipt" style="color: var(--accent-color);"></i> 
                            <div>
                                INV-${shortId}
                                <div class="order-date">${formattedDate}</div>
                            </div>
                        </div>
                        <div class="status-badge ${statusClass}">${rawStatus}</div>
                    </div>
                    
                    <div class="order-items">
                        ${itemsHTML}
                    </div>

                    <div class="order-footer">
                        <div>
                            <div class="total-text">Total Belanja</div>
                            <div class="total-price">${displayTotal}</div>
                        </div>
                        ${rawStatus.toLowerCase() !== 'dibatalkan' && rawStatus.toLowerCase() !== 'selesai' 
                            ? `<button class="btn-track" onclick="showNotification('Tahap Pengembangan', 'Fitur pelacakan resi pengiriman akan segera hadir pada pembaruan selanjutnya.', 'warning')"><i class="fas fa-truck"></i> Lacak</button>` 
                            : ''}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        window.filterOrders = function(status) {
            currentStatusFilter = status;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.getAttribute('data-status') === status) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderOrders(status);
        }

        document.addEventListener('DOMContentLoaded', fetchOrders);

    </script>
</body>
</html>
