<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja | Goedang Grosir</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #e0e5ec; --text-main: #2d3436; --text-muted: #636e72; --accent-color: #0984e3;
            --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        [data-theme="dark"] {
            --bg-color: #1a1b1e; --text-main: #f5f6fa; --text-muted: #a4b0be; --accent-color: #00e5ff;
            --shadow-light: rgba(255, 255, 255, 0.05); --shadow-dark: rgba(0, 0, 0, 0.6);
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-hover: 12px 12px 20px var(--shadow-dark), -9px -9px 16px var(--shadow-light), 0 0 15px rgba(0, 229, 255, 0.2);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        .top-nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .logo { font-size: 20px; font-weight: 700; color: var(--accent-color); letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        
        .controls { display: flex; align-items: center; gap: 20px; }
        .theme-switch { width: 60px; height: 30px; border-radius: 50px; background: var(--bg-color); box-shadow: var(--neu-pressed); position: relative; cursor: pointer; display: flex; align-items: center; padding: 4px; }
        .switch-handle { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-color); box-shadow: var(--neu-flat); position: absolute; left: 4px; transition: transform 0.4s ease; display: flex; justify-content: center; align-items: center; color: var(--accent-color); font-size: 10px; }
        [data-theme="dark"] .switch-handle { transform: translateX(30px); }

        .nav-link { color: var(--text-muted); text-decoration: none; position: relative; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .nav-link:hover { color: var(--accent-color); }
        
        .neu-btn-icon { background: var(--bg-color); color: var(--text-main); border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: var(--neu-flat-sm); cursor: pointer; text-decoration: none; position: relative; }
        .neu-btn-icon:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }

        .nav-profile-badge { display: flex; flex-direction: row; align-items: center; justify-content: center; text-decoration: none; gap: 10px; transition: transform 0.2s ease; cursor: pointer; background: var(--bg-color); padding: 5px 15px 5px 5px; border-radius: 50px; box-shadow: var(--neu-flat-sm); }
        .nav-profile-badge:active { box-shadow: var(--neu-pressed-sm); }
        .nav-profile-badge img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; box-shadow: var(--neu-pressed-sm); border: 2px solid transparent; }
        [data-theme="dark"] .nav-profile-badge img { border-color: rgba(255,255,255,0.1); }
        .nav-profile-badge span { font-size: 13px; font-weight: 700; color: var(--text-main); max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .badge-count { position: absolute; top: -8px; right: -12px; background: #ff4757; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--bg-color); display: flex; justify-content: center; align-items: center; }

        /* --- KONTEN UTAMA --- */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; flex: 1; width: 100%; }
        .page-title { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: 700; margin-bottom: 25px; }
        .btn-back { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-color); color: var(--text-main); text-decoration: none; box-shadow: var(--neu-flat); transition: transform 0.2s; }
        .btn-back:active { box-shadow: var(--neu-pressed); color: var(--accent-color); }

        .cart-layout { display: flex; gap: 30px; align-items: flex-start; }
        .cart-items-section { flex: 2; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        
        .cart-card { background: var(--bg-color); border-radius: 15px; padding: 12px 15px; box-shadow: var(--neu-flat); display: flex; gap: 15px; align-items: center; }
        .cart-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; box-shadow: var(--neu-pressed-sm); flex-shrink: 0; }
        .cart-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .cart-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cart-price { font-size: 14px; font-weight: 700; color: var(--accent-color); }
        
        .cart-actions-inline { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .qty-control { display: flex; align-items: center; gap: 5px; background: var(--bg-color); padding: 4px; border-radius: 12px; box-shadow: var(--neu-pressed-sm); }
        .qty-btn { width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--bg-color); box-shadow: var(--neu-flat-sm); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; color: var(--text-main); }
        .qty-btn:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }
        .qty-input { width: 30px; text-align: center; border: none; background: transparent; font-weight: 700; font-size: 12px; color: var(--text-main); outline: none; }
        .btn-delete { background: var(--bg-color); color: #ff4757; border: none; width: 30px; height: 30px; border-radius: 50%; box-shadow: var(--neu-flat-sm); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        .btn-delete:active { box-shadow: var(--neu-pressed-sm); }

        /* --- RINGKASAN CHECKOUT --- */
        .checkout-summary { flex: 1; background: var(--bg-color); border-radius: 25px; padding: 25px; box-shadow: var(--neu-flat); position: sticky; top: 100px; }
        .summary-actions { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        
        .summary-action-btn { background: var(--bg-color); border: none; padding: 12px 15px; border-radius: 15px; box-shadow: var(--neu-flat-sm); display: flex; align-items: center; gap: 12px; cursor: pointer; text-align: left; overflow: hidden; width: 100%; }
        .summary-action-btn:active { box-shadow: var(--neu-pressed-sm); }
        .summary-action-btn.active-promo { border: 2px solid #27ae60; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05); }
        .summary-action-btn i.icon-main { font-size: 16px; color: var(--accent-color); width: 18px; text-align: center; }
        .summary-action-btn.active-promo i.icon-main { color: #27ae60; }
        .summary-action-text { flex: 1; overflow: hidden; }
        .summary-action-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .summary-action-value { font-size: 12px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .summary-bottom-row { display: flex; flex-direction: column; gap: 15px; }
        .total-info { display: flex; flex-direction: column; gap: 2px; }
        .total-label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .total-price { font-size: 22px; font-weight: 700; color: var(--accent-color); line-height: 1; }
        .strike-price { font-size: 11px; text-decoration: line-through; color: var(--text-muted); margin-bottom: 2px; display: block; }

        .btn-checkout { width: 100%; padding: 15px; border-radius: 50px; border: none; background: var(--bg-color); color: var(--text-main); font-size: 15px; font-weight: 700; box-shadow: var(--neu-flat); cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-checkout:active { box-shadow: var(--neu-pressed); color: var(--accent-color); }

        .empty-cart { text-align: center; padding: 50px; color: var(--text-muted); font-size: 16px; font-weight: 600; }
        .bottom-nav { display: none; }

        /* --- STYLING MODAL (POP-UP) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-color); width: 90%; max-width: 400px; border-radius: 25px; padding: 25px; box-shadow: var(--neu-flat); transform: translateY(30px); transition: transform 0.3s ease; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-shrink: 0;}
        .modal-title-box h2 { font-size: 18px; font-weight: 700; color: var(--accent-color); display: flex; align-items: center; gap: 10px;}
        .modal-close { background: var(--bg-color); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; color: var(--text-main); box-shadow: var(--neu-flat-sm); cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; margin-left: 10px; text-transform: uppercase; letter-spacing: 0.5px;}
        .neu-input { width: 100%; padding: 12px 20px; border-radius: 15px; border: none; background: var(--bg-color); color: var(--text-main); box-shadow: var(--neu-pressed-sm); outline: none; font-size: 13px; font-weight: 600; }
        
        .promo-pill { background: var(--bg-color); border: 2px dashed rgba(9, 132, 227, 0.4); padding: 12px 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; box-shadow: var(--neu-flat-sm); }
        .promo-pill-code { font-weight: 700; font-size: 13px; color: var(--accent-color); }
        .promo-pill-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
        .promo-pill-btn { font-size: 11px; padding: 6px 12px; border-radius: 10px; background: var(--bg-color); color: var(--text-main); border: none; box-shadow: var(--neu-flat-sm); cursor: pointer; font-weight: bold; flex-shrink: 0;}

        @media (max-width: 768px) {
            .cart-layout { flex-direction: column; gap: 15px; }
            .top-nav { padding: 12px 20px; }
            .hide-on-mobile { display: none !important; }
            .container { padding-bottom: 180px; margin-top: 15px; } 
            
            /* Checkout Bar Anti-Scroll & Rapi */
            .checkout-summary {
                position: fixed; bottom: 75px; left: 12px; width: calc(100% - 24px); top: auto;
                border-radius: 20px; padding: 12px 15px;
                box-shadow: 0 5px 25px rgba(0,0,0,0.1), var(--neu-flat); z-index: 998;
                margin: 0; flex: none;
            }
            
            /* Grid Alamat & Promo Berjejer di HP agar tidak penuh */
            .summary-actions { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
            .summary-action-btn { padding: 10px 10px; gap: 8px; }
            .summary-action-btn i.icon-main { font-size: 13px; width: 14px; }
            .summary-action-value { font-size: 10px; }

            .summary-bottom-row { flex-direction: row; justify-content: space-between; align-items: center; gap: 10px; }
            .total-price { font-size: 18px; }
            .btn-checkout { padding: 10px 15px; width: auto; flex: 1; font-size: 13px; border-radius: 15px; }

            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-color); border-radius: 20px 20px 0 0; box-shadow: 0 -8px 20px rgba(0,0,0,0.05); z-index: 999; padding: 10px; justify-content: space-between; }
            .bottom-nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 9px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
            .bottom-nav-item i { font-size: 18px; }
            .bottom-nav-item.active { color: var(--accent-color); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="logo"><i class="fas fa-box-open"></i> GOEDANG</a>
        <div class="controls">
            <div class="theme-switch" id="themeToggle"><div class="switch-handle"><i class="fas fa-sun" id="switchIcon"></i></div></div>
            <a href="promo.html" class="nav-link hide-on-mobile"><i class="fas fa-tags"></i><span class="badge-count" id="promoBadge" style="display: none;">0</span></a>
            <a href="#" class="nav-link hide-on-mobile"><i class="fas fa-box"></i><span class="badge-count" id="orderBadge" style="display: none;">0</span></a>
            <a href="login.html" class="nav-profile-badge hide-on-mobile" id="navLoginBtn" style="display: none;"><img id="navAvatar" src="" alt="Avatar"><span id="navNickname">Profil</span></a>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div>Keranjang Anda</div>
        </div>

        <div class="cart-layout">
            <div class="cart-items-section" id="cartContainer">
                <div class="empty-cart"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Memuat keranjang...</div>
            </div>

            <div class="checkout-summary">
                <div class="summary-actions">
                    <button class="summary-action-btn" onclick="openAddressModal()">
                        <i class="fas fa-map-marker-alt icon-main"></i>
                        <div class="summary-action-text">
                            <div class="summary-action-label">Alamat</div>
                            <div class="summary-action-value" id="summaryAddressVal">Belum Diatur</div>
                        </div>
                    </button>

                    <button class="summary-action-btn" id="promoSummaryBtn" onclick="openPromoModal()">
                        <i class="fas fa-ticket-alt icon-main"></i>
                        <div class="summary-action-text">
                            <div class="summary-action-label">Promo</div>
                            <div class="summary-action-value" id="summaryPromoVal">Maksimal 2</div>
                        </div>
                    </button>
                </div>
                
                <div class="summary-bottom-row">
                    <div class="total-info">
                        <span class="total-label">Total</span>
                        <span class="strike-price" id="strikePriceDisplay" style="display: none;"></span>
                        <span class="total-price" id="totalPriceDisplay">Rp 0</span>
                    </div>
                    <button class="btn-checkout" id="checkoutBtn" onclick="processCheckout()">Buat Pesanan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addressModal">
        <div class="modal-content" style="max-width: 350px;">
            <div class="modal-header"><div class="modal-title-box"><h2><i class="fas fa-truck"></i> Pengiriman</h2></div><button class="modal-close" onclick="closeAddressModal()"><i class="fas fa-times"></i></button></div>
            <div class="input-group"><span class="input-label">Alamat Lengkap</span><textarea id="modalShipAddress" class="neu-input" rows="3" placeholder="Contoh: Jln. Batam Centre No. 123..."></textarea></div>
            <div class="input-group"><span class="input-label">Nomor WhatsApp</span><input type="tel" id="modalShipPhone" class="neu-input" placeholder="08123456789"></div>
            <button class="btn-checkout" onclick="saveAddressInfo()">Simpan Info</button>
        </div>
    </div>

    <div class="modal-overlay" id="promoModal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header"><div class="modal-title-box"><h2><i class="fas fa-ticket-alt"></i> Pilih Promo</h2></div><button class="modal-close" onclick="closePromoModal()"><i class="fas fa-times"></i></button></div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;"><input type="text" id="manualVoucherInput" class="neu-input" placeholder="Kode promo..." style="text-transform: uppercase;"><button class="neu-btn" onclick="applyVoucherManual()" id="btnApplyManual">Pakai</button></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;"><span style="font-size: 11px; font-weight: 700; color: var(--text-muted);">Tersedia:</span><button onclick="resetVoucher()" style="background:none; border:none; color:#ff4757; font-size:10px; font-weight:bold; cursor:pointer;">Reset</button></div>
            <div style="overflow-y: auto; flex-grow: 1;" id="availablePromosContainer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmCheckoutModal">
        <div class="modal-content" style="max-width: 320px; text-align: center;">
            <div class="modal-header" style="justify-content: center;"><div class="modal-title-box"><h2 style="color: var(--accent-color);"><i class="fas fa-check-circle"></i> Konfirmasi</h2></div></div>
            <p style="font-size: 13px; color: var(--text-muted); margin: 10px 0 20px;">Apakah alamat pengiriman Anda sudah benar?</p>
            <div style="font-size: 12px; font-weight: 700; padding: 15px; background: var(--bg-color); border-radius: 12px; box-shadow: var(--neu-pressed-sm); line-height: 1.5; margin-bottom: 25px;" id="confirmAddressDisplay"></div>
            <div style="display: flex; gap: 10px;"><button class="neu-btn" onclick="closeConfirmModal()" style="flex: 1; color: #ff4757;">Belum</button><button class="neu-btn" onclick="executeCheckout()" style="flex: 1; color: #27ae60;">Ya, Lanjut</button></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
        <a href="promo.html" class="bottom-nav-item"><div style="position: relative;"><i class="fas fa-tags"></i><span class="badge-count" id="mobilePromoBadge" style="display: none;">0</span></div><span>Promo</span></a>
        <a href="keranjang.html" class="bottom-nav-item active"><div style="position: relative;"><i class="fas fa-shopping-cart"></i><span class="badge-count" id="mobileCartBadge" style="display: none;">0</span></div><span>Keranjang</span></a>
        <a href="#" class="bottom-nav-item"><div style="position: relative;"><i class="fas fa-box"></i><span class="badge-count" id="mobileOrderBadge" style="display: none;">0</span></div><span>Pesanan</span></a>
        <a href="akun.html" class="bottom-nav-item" id="mobileAccountBtn"><i class="fas fa-user"></i><span>Akun</span></a>
    </nav>

    <script>
        const sessionData = localStorage.getItem('user_session');
        if (!sessionData) { window.location.href = 'login.html'; }
        const session = JSON.parse(sessionData);

        let cartItems = [];
        let rawSubtotal = 0; 
        let finalTotalRp = 0; 
        let appliedDiscount = 0;
        let activeVouchers = []; 
        let globalAddress = "";
        let globalPhone = "";

        // --- UPDATE UI NAVIGASI & NOTIFIKASI ---
        async function updateNavUI() {
            try {
                const userRes = await fetch('/api/user', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                if (userRes.ok) {
                    const userData = await userRes.json();
                    const fullName = userData.name || "User";
                    const nickname = fullName.split(' ')[0]; 
                    const avatarUrl = `https://api.dicebear.com/7.x/micah/svg?seed=${encodeURIComponent(fullName)}&backgroundColor=e0e5ec`;

                    globalAddress = userData.address || "";
                    globalPhone = userData.phone || "";
                    if(globalAddress) document.getElementById('summaryAddressVal').innerText = "Sudah Sesuai";

                    document.getElementById('navLoginBtn').style.display = 'flex';
                    document.getElementById('navAvatar').src = avatarUrl;
                    document.getElementById('navNickname').innerText = nickname;

                    const mobileAccountBtn = document.getElementById('mobileAccountBtn');
                    mobileAccountBtn.innerHTML = `<img src="${avatarUrl}" alt="Avatar" style="width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-bottom: 2px;"><span>${nickname}</span>`;
                }

                // Promo Badge
                const vchRes = await fetch('/api/vouchers', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                if(vchRes.ok) {
                    const list = await vchRes.json();
                    if(list.length > 0) {
                        document.getElementById('promoBadge').style.display = 'flex'; document.getElementById('promoBadge').innerText = list.length;
                        document.getElementById('mobilePromoBadge').style.display = 'flex'; document.getElementById('mobilePromoBadge').innerText = list.length;
                    }
                }
            } catch (e) {}
        }

        // --- KERANJANG BELANJA ---
        function formatRupiah(number) { return "Rp " + number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function parsePrice(priceString) { return parseInt(priceString.replace(/[^0-9]/g, '')) || 0; }

        function renderCartItems() {
            const container = document.getElementById('cartContainer');
            if(cartItems.length === 0) {
                container.innerHTML = `<div class="empty-cart"><i class="fas fa-box-open fa-3x"></i><br><br>Keranjang kosong.<br><a href="index.html" style="color:var(--accent-color); text-decoration:none;">Belanja Sekarang</a></div>`;
                document.getElementById('totalPriceDisplay').innerText = "Rp 0";
                document.getElementById('strikePriceDisplay').style.display = 'none';
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }

            container.innerHTML = '';
            let total = 0;
            cartItems.forEach(item => {
                total += (parsePrice(item.product_price) * item.quantity);
                const card = document.createElement('div');
                card.className = 'cart-card';
                card.innerHTML = `<img src="${item.product_img}" class="cart-img"><div class="cart-details"><div class="cart-title">${item.product_name}</div><div class="cart-price">${item.product_price}</div><div class="cart-actions-inline"><div class="qty-control"><button class="qty-btn" onclick="changeQty('${item.id}', -1)"><i class="fas fa-minus"></i></button><input type="text" class="qty-input" value="${item.quantity}" readonly><button class="qty-btn" onclick="changeQty('${item.id}', 1)"><i class="fas fa-plus"></i></button></div><button class="btn-delete" onclick="deleteItem('${item.id}')"><i class="fas fa-trash-alt"></i></button></div></div>`;
                container.appendChild(card);
            });

            rawSubtotal = total;
            if(activeVouchers.length > 0) recalculatePromo();
            else { finalTotalRp = total; document.getElementById('strikePriceDisplay').style.display = 'none'; document.getElementById('totalPriceDisplay').innerText = formatRupiah(finalTotalRp); }
            
            document.getElementById('checkoutBtn').disabled = false;
            const totalQty = cartItems.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('mobileCartBadge').style.display = totalQty > 0 ? 'flex' : 'none';
            document.getElementById('mobileCartBadge').innerText = totalQty;
        }

        async function loadCart() {
            try {
                const res = await fetch('/api/cart', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                cartItems = await res.json();
                renderCartItems();
            } catch (e) {}
        }

        async function changeQty(id, delta) {
            const i = cartItems.find(x => x.id === id);
            if(!i) return;
            const newQty = i.quantity + delta;
            if(newQty < 1) return deleteItem(id);
            i.quantity = newQty;
            renderCartItems();
            await fetch('/api/cart', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` }, body: JSON.stringify({ product_id: i.product_id, product_name: i.product_name, product_price: i.product_price, product_img: i.product_img, quantity: delta }) });
        }

        async function deleteItem(id) {
            if(!confirm("Hapus barang?")) return;
            await fetch('/api/cart', { method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` }, body: JSON.stringify({ id }) });
            cartItems = cartItems.filter(x => x.id !== id);
            renderCartItems();
        }

        // --- PROMO & ALAMAT ---
        function openAddressModal() { document.getElementById('modalShipAddress').value = globalAddress; document.getElementById('modalShipPhone').value = globalPhone; document.getElementById('addressModal').classList.add('active'); }
        function closeAddressModal() { document.getElementById('addressModal').classList.remove('active'); }
        function saveAddressInfo() { globalAddress = document.getElementById('modalShipAddress').value; globalPhone = document.getElementById('modalShipPhone').value; document.getElementById('summaryAddressVal').innerText = globalAddress ? "Sudah Sesuai" : "Belum Diatur"; closeAddressModal(); }

        function openPromoModal() { document.getElementById('promoModal').classList.add('active'); loadAvailableVouchers(); }
        function closePromoModal() { document.getElementById('promoModal').classList.remove('active'); }

        async function loadAvailableVouchers() {
            const res = await fetch('/api/vouchers', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
            const list = await res.json();
            const container = document.getElementById('availablePromosContainer');
            container.innerHTML = '';
            list.forEach(v => {
                const isUsed = activeVouchers.some(x => x.code === v.code);
                container.innerHTML += `<div class="promo-pill"><div class="promo-pill-info"><span class="promo-pill-code">${v.code}</span><span class="promo-pill-desc">${v.title}</span></div><button class="promo-pill-btn" onclick="executePromo('${v.code}')" ${isUsed ? 'disabled style="opacity:0.5"' : ''}>${isUsed ? 'Terpakai' : 'Pakai'}</button></div>`;
            });
        }

        function resetVoucher() { activeVouchers = []; appliedDiscount = 0; finalTotalRp = rawSubtotal; document.getElementById('promoSummaryBtn').classList.remove('active-promo'); document.getElementById('summaryPromoVal').innerText = "Maksimal 2"; document.getElementById('summaryPromoVal').style.color = ""; renderCartItems(); }

        async function executePromo(code) {
            if(activeVouchers.length >= 2) return alert("Maksimal 2 promo!");
            const res = await fetch('/api/apply-voucher', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, total_price: finalTotalRp }) });
            const result = await res.json();
            if(!res.ok) return alert(result.error);
            activeVouchers.push({ code, discount: result.discount_amount });
            appliedDiscount += result.discount_amount;
            finalTotalRp = rawSubtotal - appliedDiscount;
            updatePromoUI();
            closePromoModal();
        }

        function updatePromoUI() {
            const btn = document.getElementById('promoSummaryBtn');
            btn.classList.add('active-promo');
            document.getElementById('summaryPromoVal').innerText = `${activeVouchers.length} Promo Aktif`;
            document.getElementById('summaryPromoVal').style.color = "#27ae60";
            document.getElementById('strikePriceDisplay').style.display = 'block';
            document.getElementById('strikePriceDisplay').innerText = formatRupiah(rawSubtotal);
            document.getElementById('totalPriceDisplay').innerText = formatRupiah(finalTotalRp);
        }

        function recalculatePromo() {
            let disc = 0;
            activeVouchers.forEach(v => disc += v.discount);
            appliedDiscount = disc;
            finalTotalRp = rawSubtotal - appliedDiscount;
            updatePromoUI();
        }

        // --- CHECKOUT ---
        function processCheckout() {
            if(!globalAddress) return openAddressModal();
            document.getElementById('confirmAddressDisplay').innerText = globalAddress + "\n(Telp: " + globalPhone + ")";
            document.getElementById('confirmCheckoutModal').classList.add('active');
        }
        function closeConfirmModal() { document.getElementById('confirmCheckoutModal').classList.remove('active'); }
        async function executeCheckout() {
            const btn = document.getElementById('checkoutBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const res = await fetch('/api/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` }, body: JSON.stringify({ shipping_address: globalAddress, phone_number: globalPhone, total_price: formatRupiah(finalTotalRp), items: cartItems }) });
            if(res.ok) { alert("Checkout Berhasil!"); window.location.href = 'index.html'; }
            else { alert("Gagal checkout."); btn.innerText = "Buat Pesanan"; }
        }

        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        if (localStorage.getItem('theme') === 'dark') { html.setAttribute('data-theme', 'dark'); document.getElementById('switchIcon').classList.replace('fa-sun', 'fa-moon'); }
        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.getElementById('switchIcon').classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
        });

        window.addEventListener('DOMContentLoaded', () => { updateNavUI(); loadCart(); });
    </script>
</body>
</html>
