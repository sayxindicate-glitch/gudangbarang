<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo & Voucher | Goedang Grosir</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #e0e5ec; --text-main: #2d3436; --text-muted: #636e72; --accent-color: #0984e3;
            --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        [data-theme="dark"] {
            --bg-color: #1a1b1e; --text-main: #f5f6fa; --text-muted: #a4b0be; --accent-color: #00e5ff;
            --shadow-light: rgba(255, 255, 255, 0.05); --shadow-dark: rgba(0, 0, 0, 0.6);
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER NAVIGASI DESKTOP (SINKRON 100% DENGAN BERANDA & KERANJANG) --- */
        .top-nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .logo { font-size: 20px; font-weight: 700; color: var(--accent-color); letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        
        .controls { display: flex; align-items: center; gap: 20px; }
        .theme-switch { width: 60px; height: 30px; border-radius: 50px; background: var(--bg-color); box-shadow: var(--neu-pressed); position: relative; cursor: pointer; display: flex; align-items: center; padding: 4px; flex-shrink: 0; }
        .switch-handle { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-color); box-shadow: var(--neu-flat); position: absolute; left: 4px; transition: transform 0.4s ease; display: flex; justify-content: center; align-items: center; color: var(--accent-color); font-size: 10px; }
        [data-theme="dark"] .switch-handle { transform: translateX(30px); }

        .nav-link { color: var(--text-muted); text-decoration: none; position: relative; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .nav-link:hover { color: var(--accent-color); }
        .nav-link.active { color: var(--accent-color); }
        
        .neu-btn-icon { background: var(--bg-color); color: var(--text-main); border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: var(--neu-flat-sm); cursor: pointer; text-decoration: none; position: relative; }
        .neu-btn-icon:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }

        /* Tombol Login Lonjong Standar (Saat Belum Login) */
        .nav-btn-cap { background: var(--bg-color); color: var(--text-main); text-decoration: none; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 50px; box-shadow: var(--neu-flat-sm); }
        .nav-btn-cap:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }

        /* Desain Profil Badge Horizontal Premium (Saat Sudah Login) */
        .nav-profile-badge { display: flex; flex-direction: row; align-items: center; justify-content: center; text-decoration: none; gap: 10px; transition: transform 0.2s ease; cursor: pointer; background: var(--bg-color); padding: 5px 15px 5px 5px; border-radius: 50px; box-shadow: var(--neu-flat-sm); }
        .nav-profile-badge:active { box-shadow: var(--neu-pressed-sm); }
        .nav-profile-badge img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; box-shadow: var(--neu-pressed-sm); border: 2px solid transparent; }
        [data-theme="dark"] .nav-profile-badge img { border-color: rgba(255,255,255,0.1); }
        .nav-profile-badge span { font-size: 13px; font-weight: 700; color: var(--text-main); max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .badge-count { position: absolute; top: -8px; right: -12px; background: #ff4757; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10;}

        /* --- KONTEN PROMO --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; flex: 1; width: 100%; }
        .page-header { text-align: center; margin-bottom: 50px; }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 10px; color: var(--accent-color); }
        .page-subtitle { font-size: 14px; color: var(--text-muted); font-weight: 600; }

        .voucher-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        
        .voucher-card {
            background: var(--bg-color); border-radius: 20px; padding: 25px;
            box-shadow: var(--neu-flat); display: flex; flex-direction: column;
            position: relative; overflow: hidden; border-left: 8px solid var(--accent-color);
            transition: transform 0.3s ease;
        }
        .voucher-card:hover { transform: translateY(-5px); }
        
        .voucher-card::before, .voucher-card::after {
            content: ''; position: absolute; width: 30px; height: 30px;
            background-color: var(--bg-color); border-radius: 50%;
            top: 50%; transform: translateY(-50%); box-shadow: var(--neu-pressed-sm);
        }
        .voucher-card::before { left: -15px; }
        .voucher-card::after { right: -15px; }

        .voucher-title { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; padding-left: 10px; }
        .voucher-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; line-height: 1.6; padding-left: 10px; flex-grow: 1; }
        
        .voucher-timer { font-size: 11px; font-weight: 700; color: #ff4757; padding-left: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        .voucher-timer i { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .voucher-code-box {
            background: var(--bg-color); padding: 12px 20px; border-radius: 12px;
            box-shadow: var(--neu-pressed-sm); display: flex; justify-content: space-between; align-items: center;
            border: 2px dashed rgba(128,128,128,0.3); margin: 0 10px;
        }
        .voucher-code { font-family: monospace; font-size: 18px; font-weight: 700; color: var(--accent-color); letter-spacing: 2px; }
        .btn-copy {
            background: var(--bg-color); color: var(--text-main); border: none; border-radius: 8px;
            padding: 8px 15px; font-size: 12px; font-weight: 700; box-shadow: var(--neu-flat-sm); cursor: pointer; transition: all 0.2s;
        }
        .btn-copy:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }
        .btn-copy.copied { color: #27ae60; box-shadow: var(--neu-pressed-sm); }

        .loading-state, .empty-state { text-align: center; padding: 50px; color: var(--text-muted); font-size: 16px; font-weight: 600; grid-column: 1 / -1; }

        .bottom-nav { display: none; }

        @media (max-width: 768px) {
            .voucher-grid { grid-template-columns: 1fr; gap: 25px; }
            .top-nav { padding: 15px 20px; }
            .hide-on-mobile { display: none !important; }
            body { padding-bottom: 90px; }
            
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-color); border-radius: 20px 20px 0 0; box-shadow: 0 -8px 20px rgba(0,0,0,0.05); z-index: 999; padding: 10px; justify-content: space-between; }
            [data-theme="dark"] .bottom-nav { box-shadow: 0 -8px 20px rgba(0,0,0,0.4); }
            .bottom-nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 9px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
            .bottom-nav-item i { font-size: 18px; }
            .bottom-nav-item.active { color: var(--accent-color); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="logo"><i class="fas fa-box-open"></i> GOEDANG</a>
        <div class="controls">
            <div class="theme-switch" id="themeToggle"><div class="switch-handle"><i class="fas fa-sun" id="switchIcon"></i></div></div>
            
            <a href="promo.html" class="nav-link hide-on-mobile active">
                <i class="fas fa-tags"></i> <span>Promo</span>
                <span class="badge-count" id="promoBadge" style="display: none;">0</span>
            </a>
            <a href="#" class="nav-link hide-on-mobile">
                <i class="fas fa-box"></i> <span>Pesanan</span>
                <span class="badge-count" id="orderBadge" style="display: none;">0</span>
            </a>
            
            <a href="keranjang.html" class="neu-btn-icon hide-on-mobile">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge-count" id="cartBadge" style="display: none; top: -5px; right: -5px;">0</span>
            </a>

            <a href="login.html" class="nav-btn-cap hide-on-mobile" id="navLoginBtn">
                <i class="fas fa-sign-in-alt"></i> <span>Login</span>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-ticket-alt"></i> Voucher Spesial Anda</h1>
            <p class="page-subtitle">Segera klaim kode di bawah ini sebelum kehabisan waktu!</p>
        </div>

        <div class="voucher-grid" id="voucherContainer">
            <div class="loading-state"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Memeriksa promo yang tersedia...</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
        
        <a href="promo.html" class="bottom-nav-item active">
            <div style="position: relative;">
                <i class="fas fa-tags"></i>
                <span class="badge-count" id="mobilePromoBadge" style="display: none; top: -5px; right: -10px; font-size: 9px; padding: 2px 5px;">0</span>
            </div>
            <span>Promo</span>
        </a>
        
        <a href="keranjang.html" class="bottom-nav-item">
            <div style="position: relative;">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge-count" id="mobileCartBadge" style="display: none; top: -5px; right: -10px; font-size: 9px; padding: 2px 5px;">0</span>
            </div>
            <span>Keranjang</span>
        </a>
        
        <a href="#" class="bottom-nav-item">
            <div style="position: relative;">
                <i class="fas fa-box"></i>
                <span class="badge-count" id="mobileOrderBadge" style="display: none; top: -5px; right: -10px; font-size: 9px; padding: 2px 5px;">0</span>
            </div>
            <span>Pesanan</span>
        </a>
        
        <a href="akun.html" class="bottom-nav-item" id="mobileAccountBtn">
            <i class="fas fa-user"></i><span>Akun</span>
        </a>
    </nav>

    <script>
        const sessionData = localStorage.getItem('user_session');

        // =========================================================================
        // SINKRONISASI NAVIGASI CERDAS (LOGIN / LOGOUT PERMANEN)
        // =========================================================================
        async function updateNavUI() {
            const loginBtn = document.getElementById('navLoginBtn');
            const mobileAccountBtn = document.getElementById('mobileAccountBtn');

            if (sessionData) {
                const session = JSON.parse(sessionData);
                try {
                    const userRes = await fetch('/api/user', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                    
                    // JIKA TOKEN RUSAK / KADALUARSA BERDASARKAN SERVER: Bersihkan & Atur UI Logout
                    if (userRes.status === 401 || userRes.status === 403) {
                        localStorage.removeItem('user_session');
                        setLoggedOutUI();
                        return;
                    }

                    if (userRes.ok) {
                        const userData = await userRes.json();
                        const fullName = userData.name || "User";
                        const nickname = fullName.split(' ')[0]; 
                        const avatarUrl = `https://api.dicebear.com/7.x/micah/svg?seed=${encodeURIComponent(fullName)}&backgroundColor=e0e5ec`;

                        // Tampilan Desktop (Avatar Pil Horizontal Berjejer Rapi)
                        loginBtn.className = 'nav-profile-badge hide-on-mobile';
                        loginBtn.href = 'akun.html';
                        loginBtn.innerHTML = `<img src="${avatarUrl}" alt="Avatar"><span>${nickname}</span>`;

                        // Tampilan Mobile (Ikon orang diganti Avatar Lingkar Kecil)
                        if (mobileAccountBtn) {
                            mobileAccountBtn.href = 'akun.html';
                            mobileAccountBtn.innerHTML = `<img src="${avatarUrl}" alt="Avatar" style="width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-bottom: 2px;"><span>${nickname}</span>`;
                        }
                    }
                } catch (e) { console.log("Koneksi profil offline"); }

                // Tarik Lencana Notifikasi Keranjang Belanja
                try {
                    const cartRes = await fetch('/api/cart', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                    if (cartRes.ok) {
                        const cartItems = await cartRes.json();
                        const totalQty = cartItems.reduce((s, i) => s + i.quantity, 0);
                        if (totalQty > 0) {
                            const txt = totalQty > 99 ? '99+' : totalQty;
                            document.getElementById('cartBadge').style.display = 'flex'; document.getElementById('cartBadge').innerText = txt;
                            document.getElementById('mobileCartBadge').style.display = 'flex'; document.getElementById('mobileCartBadge').innerText = txt;
                        }
                    }
                } catch (e) {}

                // Tarik Lencana Notifikasi Pesanan Aktif
                try {
                    const orderRes = await fetch('/api/orders', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                    if (orderRes.ok) {
                        const orders = await orderRes.json();
                        const activeOrders = orders.filter(o => o.status !== 'Selesai' && o.status !== 'Dibatalkan');
                        if (activeOrders.length > 0) {
                            document.getElementById('orderBadge').style.display = 'flex'; document.getElementById('orderBadge').innerText = activeOrders.length;
                            document.getElementById('mobileOrderBadge').style.display = 'flex'; document.getElementById('mobileOrderBadge').innerText = activeOrders.length;
                        }
                    }
                } catch (e) {}

            } else {
                setLoggedOutUI();
            }
        }

        // Fungsi Helper untuk Mereset UI ke Status Belum Login / Logout
        function setLoggedOutUI() {
            const loginBtn = document.getElementById('navLoginBtn');
            const mobileAccountBtn = document.getElementById('mobileAccountBtn');

            loginBtn.className = 'nav-btn-cap hide-on-mobile';
            loginBtn.href = 'login.html';
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Login</span>';

            if (mobileAccountBtn) {
                mobileAccountBtn.href = 'login.html';
                mobileAccountBtn.innerHTML = '<i class="fas fa-user"></i><span>Akun</span>';
            }

            document.getElementById('cartBadge').style.display = 'none';
            document.getElementById('orderBadge').style.display = 'none';
            document.getElementById('promoBadge').style.display = 'none';
            document.getElementById('mobileCartBadge').style.display = 'none';
            document.getElementById('mobilePromoBadge').style.display = 'none';
            document.getElementById('mobileOrderBadge').style.display = 'none';
        }

        // =========================================================================
        // SISTEM LOAD VOUCHER & STRATEGI MARKETING BERBASIS FOMO TIMER
        // =========================================================================
        async function loadVouchers() {
            const container = document.getElementById('voucherContainer');
            
            // --- JIKA PENGGUNA BELUM LOGIN SAMA SEKALI / SESI HABIS ---
            if (!sessionData) {
                container.innerHTML = `
                    <div class="voucher-card" style="border-left-color: #ff4757;">
                        <div class="voucher-title" style="color: #ff4757;">Promo Kilat Bebas Syarat</div>
                        <div class="voucher-desc">Diskon 50% maksimal potongan Rp 25.000 untuk semua pelanggan tanpa terkecuali!</div>
                        <div class="voucher-timer"><i class="fas fa-clock"></i> Hangus dalam: <span class="countdown-text">00 : 00 : 00</span></div>
                        <div class="voucher-code-box">
                            <span class="voucher-code" id="code-public">HEMAT50</span>
                            <button class="btn-copy" onclick="copyCode('public', this)"><i class="fas fa-copy"></i> Salin</button>
                        </div>
                    </div>

                    <div class="voucher-card" style="border-left-color: var(--accent-color); border-style: dashed; justify-content: center; align-items: center; text-align: center; padding: 30px;">
                        <div class="voucher-title" style="color: var(--accent-color); padding: 0; margin-bottom: 8px;"><i class="fas fa-lock"></i> Mau Voucher Tambahan?</div>
                        <div class="voucher-desc" style="padding: 0; margin-bottom: 20px; font-weight: 500;">Yuk masuk ke akun Anda sekarang untuk membuka Voucher Pengguna Baru, Potongan Ongkir, dan diskon personal khusus lainnya!</div>
                        <a href="login.html" class="btn-copy" style="text-decoration: none; background: var(--accent-color); color: white; border-radius: 50px; padding: 10px 25px; box-shadow: var(--neu-flat-sm);">Masuk Akun</a>
                    </div>
                `;
                startCountdownTimer();
                return;
            }

            // --- JIKA PENGGUNA TERVERIFIKASI SUDAH LOGIN AKTIF ---
            const session = JSON.parse(sessionData);
            try {
                const response = await fetch('/api/vouchers', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${session.access_token}` }
                });

                if (!response.ok) throw new Error("Gagal mengambil voucher khusus");
                
                const vouchers = await response.json();
                container.innerHTML = '';

                if (vouchers.length > 0) {
                    document.getElementById('promoBadge').style.display = 'flex'; document.getElementById('promoBadge').innerText = vouchers.length;
                    document.getElementById('mobilePromoBadge').style.display = 'flex'; document.getElementById('mobilePromoBadge').innerText = vouchers.length;
                }

                if (vouchers.length === 0) {
                    container.innerHTML = `<div class="empty-state">Maaf, saat ini belum ada voucher baru yang tersedia untuk akun Anda.</div>`;
                    return;
                }

                vouchers.forEach(vch => {
                    const card = document.createElement('div');
                    card.className = 'voucher-card';
                    card.style.borderLeftColor = vch.color;

                    card.innerHTML = `
                        <div class="voucher-title" style="color: ${vch.color};">${vch.title}</div>
                        <div class="voucher-desc">${vch.desc}</div>
                        <div class="voucher-timer"><i class="fas fa-clock"></i> Hangus dalam: <span class="countdown-text">00 : 00 : 00</span></div>
                        <div class="voucher-code-box">
                            <span class="voucher-code" id="code-${vch.id}">${vch.code}</span>
                            <button class="btn-copy" onclick="copyCode('${vch.id}', this)"><i class="fas fa-copy"></i> Salin</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

                startCountdownTimer();

            } catch (error) {
                container.innerHTML = `<div class="empty-state" style="color:#ff4757;"><i class="fas fa-exclamation-triangle"></i> Gagal memuat data voucher strategis.</div>`;
            }
        }

        // --- FUNGSI MESIN HITUNG MUNDUR FOMO (Tengah Malam Reset) ---
        function startCountdownTimer() {
            function updateTimer() {
                const now = new Date();
                const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
                const diff = endOfDay - now;

                if (diff <= 0) return;

                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                const formattedTime = 
                    String(hours).padStart(2, '0') + " : " + 
                    String(minutes).padStart(2, '0') + " : " + 
                    String(seconds).padStart(2, '0');

                document.querySelectorAll('.countdown-text').forEach(el => el.innerText = formattedTime);
            }
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // --- FUNGSI SALIN KODE VOUCHER ---
        function copyCode(id, btnElement) {
            const codeText = document.getElementById(`code-${id}`).innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                const originalText = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="fas fa-check"></i> Tersalin!';
                btnElement.classList.add('copied');
                setTimeout(() => { btnElement.innerHTML = originalText; btnElement.classList.remove('copied'); }, 2000);
            });
        }

        // --- TOGGLE DARK MODE ---
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        if (localStorage.getItem('theme') === 'dark') { html.setAttribute('data-theme', 'dark'); document.getElementById('switchIcon').classList.replace('fa-sun', 'fa-moon'); }
        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.getElementById('switchIcon').classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
        });

        // INISIALISASI UTAMA
        window.addEventListener('DOMContentLoaded', () => {
            updateNavUI();
            loadVouchers();
        });
    </script>
</body>
</html>
